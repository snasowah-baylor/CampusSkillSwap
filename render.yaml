services:
  - type: web
    name: campusskillswap
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn campuskillswap.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: campusskillswap-db
          property: connectionString
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.0"

databases:
  - name: campusskillswap-db
    databaseName: campusskillswap
    user: campusskillswap
    plan: free
