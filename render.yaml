services:
  - type: web
    name: campusskillswap
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --no-input &&
      python manage.py migrate
    startCommand: gunicorn campuskillswap.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: campusskillswap-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.0"

databases:
  - name: campusskillswap-db
    databaseName: campusskillswap
    user: campusskillswap
    plan: free
