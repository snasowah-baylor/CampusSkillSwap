{% extends "marketplace/base.html" %}
{% block title %}Delete Skill — Campus SkillSwap{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">
    <div class="form-card text-center">
      <div class="mb-3" style="font-size:2.5rem; color:#ef4444;">
        <i class="bi bi-exclamation-triangle-fill"></i>
      </div>
      <h1 class="fw-800 mb-2" style="font-size:1.4rem;">Delete this post?</h1>
      <p class="text-muted small mb-4">
        You're about to permanently delete <strong>"{{ object.title }}"</strong>.
        This action cannot be undone.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
          <button type="submit" class="btn btn-danger px-4" style="border-radius:.625rem; font-weight:600;">
            <i class="bi bi-trash me-1"></i>Yes, delete
          </button>
          <a href="{% url 'marketplace:dashboard' %}" class="btn btn-outline-secondary px-4" style="border-radius:.625rem; font-weight:600;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
